<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mobile TOC Demo — WorldFirst</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;-webkit-font-smoothing:antialiased}

/* Progress bar */
#progressBar{position:fixed;top:0;left:0;right:0;z-index:1000;height:3px;background:#f0f0f0}
#progressFill{height:100%;width:0%;background:#1F2323;transition:width 60ms linear}

/* Header */
.header{background:#fff;padding:20px 20px 20px;border-bottom:1px solid #eee}
.header-inner{max-width:680px;margin:0 auto}
.breadcrumb{font-size:12px;color:#484F56;margin-bottom:20px;line-height:1.6}
.breadcrumb a{color:#E8395A;text-decoration:underline}
.header h1{font-size:32px;font-weight:600;line-height:1.2;color:#1F2323;margin-bottom:10px;letter-spacing:-.01em}
.header .meta{font-size:14px;color:#484F56;font-style:italic;margin-bottom:16px}
.share-row{display:flex;align-items:center;justify-content:space-between}
.social-icons{display:flex;gap:12px}
.social-icon{width:32px;height:32px;border-radius:50%;border:1.5px solid #1F2323;display:flex;align-items:center;justify-content:center;text-decoration:none}
.copy-link{display:flex;align-items:center;gap:6px;font-size:14px;color:#484F56;cursor:pointer}

/* Body */
.body{max-width:680px;margin:0 auto;padding:0 20px 100px}
.section{margin-top:40px}
.section:first-child{margin-top:28px}
.section h2{font-size:18px;font-weight:500;color:#1F2323;margin-bottom:14px;line-height:1.3;letter-spacing:-.01em}
.section p{font-size:15px;line-height:1.75;color:#484F56;margin-bottom:14px}
.disclaimer{margin-top:40px;padding:14px 16px;background:#fafafa;border-radius:8px;border-left:3px solid #E8395A;font-size:13px;color:#90969A;line-height:1.6;font-style:italic}

/* FAB */
#tocFab{position:fixed;left:14px;top:50%;transform:translateY(-50%);z-index:900;width:42px;height:42px;padding:0;background:#1F2323;border:none;border-radius:12px;box-shadow:0 2px 12px rgba(31,35,35,.3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s ease}
#tocFab:active{transform:translateY(-50%) scale(.93)}

/* Chat button (fake) */
.chatBtn{position:fixed;bottom:20px;right:20px;z-index:800;width:48px;height:48px;border-radius:24px;background:#E8395A;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(232,57,90,.35)}

/* Backdrop */
#backdrop{position:fixed;inset:0;z-index:998;background:rgba(0,0,0,.22);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity 220ms ease}
#backdrop.open{opacity:1;pointer-events:auto}

/* Drawer */
#drawer{position:fixed;bottom:0;left:0;right:0;z-index:999;transform:translateY(100%);transition:transform 320ms cubic-bezier(.32,.72,0,1);background:#fff;border-radius:16px 16px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,.1);max-height:68vh;display:flex;flex-direction:column}
#drawer.open{transform:translateY(0)}
.drawer-handle{display:flex;justify-content:center;padding:10px 0 4px}
.drawer-handle span{width:32px;height:4px;border-radius:4px;background:#ddd;display:block}
.drawer-header{display:flex;align-items:center;justify-content:space-between;padding:4px 20px 12px;border-bottom:1px solid #f0f0f0}
.drawer-header span{font-size:15px;font-weight:500;color:#484F56}
.drawer-close{background:#f5f5f5;border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:#999}
.drawer-list{overflow:auto;padding:8px 20px 32px;-webkit-overflow-scrolling:touch}
.toc-item{padding:9px 0 9px 14px;border-left:2px solid #ccc;cursor:pointer;transition:border-color 180ms ease}
.toc-item.active{border-left-color:#1F2323}
.toc-item span{font-size:14px;line-height:1.45;font-weight:400;color:#90969A;transition:color 180ms ease;display:block}
.toc-item.active span{color:#1F2323}
</style>
</head>
<body>

<!-- Progress bar -->
<div id="progressBar"><div id="progressFill"></div></div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="breadcrumb">
      <a href="#">Home</a> &gt; <a href="#">Insights</a> &gt; <a href="#">Thương mại điện tử quốc tế</a> &gt; Dòng Tiền Trên Amazon: Cách Hoạt Động, Cách Tối Ưu Và Cách Mở Rộng An Toàn
    </div>
    <h1>Dòng Tiền Trên Amazon: Cách Hoạt Động, Cách Tối Ưu Và Cách Mở Rộng An Toàn</h1>
    <div class="meta">Cập nhật lần cuối: 09 tháng 12, 2025</div>
    <div class="share-row">
      <div class="social-icons">
        <a href="#" class="social-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="#1F2323" stroke-width="1.8"/><circle cx="12" cy="12" r="5" stroke="#1F2323" stroke-width="1.8"/><circle cx="18.5" cy="5.5" r="1.5" fill="#1F2323"/></svg></a>
        <a href="#" class="social-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="#1F2323" stroke-width="1.8"/><path d="M8 11v5M8 8v.01M12 16v-4a2 2 0 1 1 4 0v4M12 11V8" stroke="#1F2323" stroke-width="1.8" stroke-linecap="round"/></svg></a>
        <a href="#" class="social-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#1F2323" stroke-width="1.8"/><path d="M15 3.5v4h2M10 21v-7h4v7M10 14h-2a2 2 0 0 1 0-4h2v4" stroke="#1F2323" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
      </div>
      <div class="copy-link">
        Sao chép <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke="#484F56" stroke-width="1.8" stroke-linecap="round"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" stroke="#484F56" stroke-width="1.8" stroke-linecap="round"/></svg>
      </div>
    </div>
  </div>
</header>

<!-- Body -->
<main class="body" id="articleBody"></main>

<!-- FAB -->
<button id="tocFab" onclick="toggleDrawer(true)">
  <svg id="fabSvg" width="36" height="36" viewBox="0 0 36 36">
    <!-- Progress ring track -->
    <circle cx="18" cy="18" r="16" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="2"/>
    <!-- Progress ring fill -->
    <circle id="progressRing" cx="18" cy="18" r="16" fill="none" stroke="#fff" stroke-width="2"
      stroke-linecap="round" stroke-dasharray="100.53" stroke-dashoffset="100.53"
      style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 100ms linear"/>
    <!-- List icon -->
    <rect x="12" y="11" width="2" height="1.6" rx=".8" fill="#fff"/>
    <rect x="15.5" y="11" width="8.5" height="1.6" rx=".8" fill="rgba(255,255,255,.4)"/>
    <rect x="12" y="14.2" width="2" height="1.6" rx=".8" fill="#fff"/>
    <rect x="15.5" y="14.2" width="8.5" height="1.6" rx=".8" fill="rgba(255,255,255,.4)"/>
    <rect x="12" y="17.4" width="2" height="1.6" rx=".8" fill="#fff"/>
    <rect x="15.5" y="17.4" width="8.5" height="1.6" rx=".8" fill="rgba(255,255,255,.4)"/>
    <!-- Counter -->
    <text id="fabCounter" x="18" y="26" text-anchor="middle" font-size="7" font-weight="600" fill="rgba(255,255,255,.7)" font-family="Poppins,sans-serif">1/8</text>
  </svg>
</button>

<!-- Chat button (fake) -->
<div class="chatBtn">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</div>

<!-- Backdrop -->
<div id="backdrop" onclick="toggleDrawer(false)"></div>

<!-- Drawer -->
<div id="drawer">
  <div class="drawer-handle"><span></span></div>
  <div class="drawer-header">
    <span>Mục lục</span>
    <button class="drawer-close" onclick="toggleDrawer(false)">✕</button>
  </div>
  <div class="drawer-list" id="drawerList"></div>
</div>

<script>
// ─── Data ───
const sections = [
  { id:"intro", hidden:true, content:["Trong kinh doanh trên Amazon, phần lớn người bán thường bắt đầu bằng câu hỏi: bán sản phẩm nào, biên lợi nhuận bao nhiêu, chạy quảng cáo thế nào cho hiệu quả. Tuy nhiên, khi quy mô tăng lên, vấn đề không còn chỉ là \"bán có lãi hay không\", mà là \"vốn đang nằm ở đâu, quay vòng nhanh hay chậm và mô hình có đủ an toàn để mở rộng hay không\".","Dòng tiền vì thế trở thành lớp nền tài chính quan trọng nhất. Doanh nghiệp có thể có doanh thu cao và lợi nhuận trên giấy tích cực, nhưng nếu không quản lý tốt dòng tiền, rất dễ rơi vào tình trạng thiếu vốn lưu động.","Bài viết này tập trung giải thích cách dòng tiền vận hành trên Amazon, các nguyên tắc tài chính cơ bản để tối ưu lợi nhuận và vòng quay vốn, cũng như những lưu ý khi nhân rộng mô hình kinh doanh."] },
  { id:"mechanism", toc:"1. Cơ Chế Dòng Tiền Trên Amazon: Doanh Thu Và Tiền Thực Nhận Không Trùng Thời Điểm", title:"1. Cơ Chế Dòng Tiền Trên Amazon: Doanh Thu Và Tiền Thực Nhận Không Trùng Thời Điểm", content:["Về mặt nguyên tắc, Amazon đóng vai trò trung gian thu – chi. Khách hàng thanh toán cho Amazon, Amazon thu phí và sau đó thanh toán lại phần còn lại cho người bán theo lịch.","Khi bán theo mô hình FBA, dòng tiền từ mỗi đơn sẽ được \"chốt\" sau khoảng vài ngày kể từ khi khách nhận hàng, dẫn đến độ trễ dạng T+7 là khá phổ biến.","Với mô hình FBM, Amazon áp dụng thời gian thanh toán dài hơn, có thể ở mức T+14 đến T+30.","Amazon thiết lập lịch thanh toán theo chu kỳ, thường là hai lần mỗi tháng. Số dư trong Seller Central là \"tiền đang nằm trong hệ sinh thái Amazon\", chứ không phải tiền mặt sẵn sàng sử dụng.","Doanh nghiệp cần phân biệt rõ: doanh thu ghi nhận, số tiền đủ điều kiện thanh toán, và số tiền thực sự đã về tài khoản ngân hàng."] },
  { id:"profit", toc:"2. Lợi Nhuận Trên Mỗi Đơn Hàng: Biên Lợi Nhuận Phải Đủ Trước Khi Nghĩ Tới Dòng Tiền", title:"2. Lợi Nhuận Trên Mỗi Đơn Hàng: Biên Lợi Nhuận Phải Đủ Trước Khi Nghĩ Tới Dòng Tiền", content:["Nếu biên lợi nhuận trên mỗi đơn quá mỏng, các nỗ lực tối ưu dòng tiền chỉ giúp doanh nghiệp… thua lỗ nhanh hơn.","Ngưỡng tham chiếu: biên lợi nhuận gộp trước quảng cáo nên từ 30% trở lên, giá vốn chiếm tối đa 25% giá bán.","Ví dụ: sản phẩm bán 100 USD, giá vốn 25 USD, phí Amazon 40 USD → biên lợi nhuận gộp 35%.","Tối ưu giá vốn và thiết kế biên lợi nhuận gộp hợp lý là nền tảng bắt buộc."] },
  { id:"inventory", toc:"3. Hàng Tồn Kho Và Vòng Quay Hàng: Vốn Đang Nằm Ở Đâu?", title:"3. Hàng Tồn Kho Và Vòng Quay Hàng: Vốn Đang Nằm Ở Đâu?", content:["Vốn phân tán trên toàn bộ chuỗi cung ứng: nhà máy, container, kho Amazon và hàng tồn chưa bán.","Lượng tồn kho mục tiêu thường ở mức 3-4 tháng bán hàng.","Ở giai đoạn cao điểm quý 4, kế hoạch tồn kho cần gắn với dữ liệu lịch sử.","Vòng quay hàng là trụ cột của vòng quay tiền. Tồn kho quá dài → dòng vốn bị kéo căng."] },
  { id:"cash-cycle", toc:"4. Vòng Quay Tiền: Không Chỉ Là \"Lãi Bao Nhiêu\", Mà Là \"Mất Bao Lâu Để Thu Về\"", title:"4. Vòng Quay Tiền: Không Chỉ Là \"Lãi Bao Nhiêu\", Mà Là \"Mất Bao Lâu Để Thu Về\"", content:["Cash conversion cycle: tiền mặt → tồn kho → doanh thu → tiền mặt.","Biên lợi nhuận tốt nhưng vòng quay dài vẫn gây áp lực lớn.","Một số DN chốt thưởng sau 2 chu kỳ thanh toán để đồng bộ với dòng tiền thực.","Nhìn nhận hệ thống giúp quyết định nhập hàng và mở rộng mang tính chiến lược hơn."] },
  { id:"reserve", toc:"5. Dự Trữ Tiền Mặt: Lớp Đệm Cần Thiết Cho Mọi Mô Hình Amazon", title:"5. Dự Trữ Tiền Mặt: Lớp Đệm Cần Thiết Cho Mọi Mô Hình Amazon", content:["Rủi ro luôn tồn tại: thay đổi thuật toán, chính sách, đối thủ mới, gián đoạn chuỗi cung ứng.","Ngưỡng: duy trì tiền mặt đủ chi trả chi phí cố định trong 6 tháng.","Quỹ dự trữ phải là tiền đã rút về, tách biệt với phần đang nằm trên Amazon."] },
  { id:"scale", toc:"6. Nhân Rộng Mô Hình: Ưu Tiên Nhân Bằng Lợi Nhuận Đã Thu Hồi", title:"6. Nhân Rộng Mô Hình: Ưu Tiên Nhân Bằng Lợi Nhuận Đã Thu Hồi", content:["Câu hỏi \"nên nhân lên như thế nào\" trở thành trọng tâm khi có kết quả tích cực.","Ví dụ: vốn 1 tỷ, sau 5-6 tháng thu về 2 tỷ. Mở rộng bằng phần lợi nhuận → vốn gốc an toàn.","Ưu tiên nhân rộng bằng lợi nhuận đã thu hồi là nguyên tắc an toàn."] },
  { id:"fbm-fba", toc:"7. So Sánh FBM Và FBA Dưới Góc Độ Dòng Tiền", title:"7. So Sánh FBM Và FBA Dưới Góc Độ Dòng Tiền", content:["FBA vs FBM không chỉ là vận hành mà còn là bài toán cấu trúc vốn.","FBA: logistics chuẩn hóa, nhưng vốn nằm trong hàng tồn + hệ thống Amazon.","FBM: kiểm soát tốt hơn tồn kho, có thể rút ngắn vòng quay tiền.","Người mới nên bắt đầu FBA. Khi hiểu rõ dòng tiền → cân nhắc kết hợp."] },
  { id:"conclusion", toc:"Kết Luận", title:"Kết Luận", content:["Dòng tiền = cách Amazon thanh toán + biên lợi nhuận + tồn kho + vòng quay vốn + dự phòng.","Hiểu đúng dòng tiền → xác định dùng vốn hiệu quả chưa, mở rộng có phù hợp không.","Lợi thế thuộc về đơn vị quản trị dòng tiền kỷ luật, minh bạch và chủ động."] },
];

const tocItems = sections.filter(s => !s.hidden);
let activeId = tocItems[0].id;

// ─── Render article ───
const body = document.getElementById('articleBody');
sections.forEach((s, i) => {
  const sec = document.createElement('section');
  sec.className = 'section';
  sec.id = 'sec-' + s.id;
  if (i === 0) sec.style.marginTop = '28px';
  let html = '';
  if (!s.hidden) html += `<h2>${s.title}</h2>`;
  s.content.forEach(p => { html += `<p>${p}</p>`; });
  sec.innerHTML = html;
  body.appendChild(sec);
});
body.insertAdjacentHTML('beforeend', '<div class="disclaimer">Bài viết được phối hợp bởi WorldFirst và Z-ECOM – Đơn Vị Đào Tạo Xây Dựng Thương Hiệu Việt Trên Amazon.</div>');

// ─── Render drawer TOC ───
const drawerList = document.getElementById('drawerList');
tocItems.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'toc-item' + (i === 0 ? ' active' : '');
  div.dataset.id = s.id;
  div.innerHTML = `<span>${s.toc}</span>`;
  div.onclick = () => scrollToSection(s.id);
  drawerList.appendChild(div);
});

// ─── Drawer toggle ───
function toggleDrawer(open) {
  document.getElementById('drawer').classList.toggle('open', open);
  document.getElementById('backdrop').classList.toggle('open', open);
  if (open) {
    // Auto-scroll to active item in drawer
    const activeItem = drawerList.querySelector('.toc-item.active');
    if (activeItem) {
      const top = activeItem.offsetTop - drawerList.offsetTop - drawerList.clientHeight / 2 + activeItem.clientHeight / 2;
      drawerList.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    }
  }
}

// ─── Scroll to section ───
function scrollToSection(id) {
  toggleDrawer(false);
  setTimeout(() => {
    const el = document.getElementById('sec-' + id);
    if (el) window.scrollTo({ top: el.offsetTop - 64, behavior: 'smooth' });
  }, 120);
}

// ─── Scroll listener ───
const C = 2 * Math.PI * 16; // ring circumference
const progressRing = document.getElementById('progressRing');
const progressFill = document.getElementById('progressFill');
const fabCounter = document.getElementById('fabCounter');

window.addEventListener('scroll', () => {
  const st = window.scrollY;
  const dh = document.documentElement.scrollHeight - window.innerHeight;
  const pct = dh > 0 ? Math.min(st / dh * 100, 100) : 0;

  // Progress bar
  progressFill.style.width = pct + '%';

  // Ring
  progressRing.setAttribute('stroke-dashoffset', C - (C * pct) / 100);

  // Active section
  let cur = tocItems[0].id;
  sections.forEach(s => {
    const el = document.getElementById('sec-' + s.id);
    if (el && el.getBoundingClientRect().top <= 100)
      cur = s.hidden ? tocItems[0].id : s.id;
  });

  if (cur !== activeId) {
    activeId = cur;
    const idx = tocItems.findIndex(s => s.id === cur);
    fabCounter.textContent = (idx + 1) + '/' + tocItems.length;

    // Update drawer items
    drawerList.querySelectorAll('.toc-item').forEach(item => {
      item.classList.toggle('active', item.dataset.id === cur);
    });
  }
}, { passive: true });
</script>

</body>
</html>
